name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Go backend ──────────────────────────────────────────────────────────────
  backend:
    name: Go – Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: diaspora
          POSTGRES_PASSWORD: diaspora
          POSTGRES_DB: diaspora_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://diaspora:diaspora@localhost:5432/diaspora_test?sslmode=disable"
      JWT_SECRET: "ci-test-secret"
      SOLANA_RPC_URL: "https://api.devnet.solana.com"
      ADMIN_PRIVATE_KEY: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply database migrations
        run: |
          # Install psql
          sudo apt-get install -y postgresql-client
          psql "$DATABASE_URL" -f migration/create_table.sql

      - name: Download dependencies
        run: go mod download

      - name: Verify module tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build -v ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 3m

      - name: Run unit tests
        run: |
          go test ./internal/solana/... \
                  ./internal/middleware/... \
                  ./internal/handlers/... \
                  ./internal/utils/... \
                  -v -race -count=1 -timeout 60s

      - name: Run all tests with coverage
        run: |
          go test ./... \
            -v -race -count=1 -timeout 120s \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          flags: backend
          fail_ci_if_error: false

  # ── Anchor smart contract ───────────────────────────────────────────────────
  smart-contract:
    name: Anchor – Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: anchor-diasporaconnect

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI (via AVM)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.35.0
          avm use 0.35.0
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Install Node.js (for Anchor tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: anchor-diasporaconnect/package-lock.json

      - name: Install Node.js test dependencies
        working-directory: anchor-diasporaconnect
        run: npm ci --ignore-scripts 2>/dev/null || npm install

      - name: Build Anchor program
        working-directory: anchor-diasporaconnect
        env:
          TREASURY_PUBLIC_KEY: "11111111111111111111111111111111"
        run: |
          # Patch TREASURY_AUTHORITY for CI build
          sed -i "s|pub const TREASURY_AUTHORITY: &str = \".*\";|pub const TREASURY_AUTHORITY: \&str = \"11111111111111111111111111111111\";|g" \
            programs/diasporaconnect/src/lib.rs
          anchor build

      - name: Run Anchor tests (localnet)
        working-directory: anchor-diasporaconnect
        run: |
          # Start test validator in background
          solana-test-validator --reset --quiet &
          VALIDATOR_PID=$!
          sleep 5
          anchor test --skip-local-validator || true
          kill $VALIDATOR_PID 2>/dev/null || true

  # ── Security scan ───────────────────────────────────────────────────────────
  security:
    name: Security – govulncheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
